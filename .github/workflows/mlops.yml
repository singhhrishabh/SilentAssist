name: MLOps Model Verification Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.py'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libglib2.0-0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run CI/CD Integrity Evaluation
      run: |
        python eval.py --ci
        
    - name: Upload Weights Cache (Optional Strategy)
      uses: actions/upload-artifact@v4
      with:
        name: weights-cache
        path: .weights_cache/
